{% extends "base.html" %}

{% block title %}Groceries{% endblock %}

{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<h1>Groceries Trending Now</h1>

<div class="products_grid">
<table>
    {% for product in products %}
<!--Products-->
    <tr>
       <td class="product_container">
            <div class='product_card'>
                <div class='product_image'>
                    <img  src="{{ url_for('static', filename='/images/' + product.image_url )}}" height='400px' width='300px' alt="{{ product.name }}">
                </div>
                <div class="product_description"> 
                    <h2>{{ product.name }}</h2>
                    

                    <div class="rating"> 
                        <p>{{ product.rating }} <a href="/product_details"> View details</a>
                    </div>

                    <p>{{ product.description}}</p>
                    <div class="price">£{{ product.price }} </div>
                    <a class="add_to_cart" href="/order" >Order Now</a>
                </div>
            </div>
        </td>

    {% endfor %} 
   
   
    </tbody>
</table>    
 </div>













{% endblock %}
